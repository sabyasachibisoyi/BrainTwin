<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* ---- Layout & theme ----------------------------------------------- */
  /* Popup widens to 380px so the Remember result cards have room to
     breathe — the Capture tab works fine at the same width. */
  body {
    width: 380px;
    margin: 0;
    padding: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f0f17;
    color: #e0e0e0;
  }

  .container { padding: 14px 16px; }

  h1 {
    font-size: 1.05rem;
    margin: 0 0 12px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ---- Tab switcher ------------------------------------------------- */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid #222;
    margin: -2px 0 12px;
  }
  .tab {
    flex: 1;
    padding: 8px 0;
    background: transparent;
    border: none;
    color: #888;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab:hover { color: #c7d2fe; }
  .tab.active {
    color: #c7d2fe;
    border-bottom-color: #6366f1;
  }

  /* ---- Capture view (existing) -------------------------------------- */
  .view { display: none; }
  .view.active { display: block; }

  .stat {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #222;
    font-size: 0.85rem;
  }
  .stat .label { color: #888; }
  .stat .value { font-weight: 600; color: #a5b4fc; }

  .toggle {
    margin-top: 14px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .toggle.on { background: #6366f1; color: white; }
  .toggle.off { background: #333; color: #888; }
  .toggle:hover { opacity: 0.85; }

  .footer {
    margin-top: 12px;
    font-size: 0.7rem;
    color: #555;
    text-align: center;
  }

  /* ---- Remember view ---------------------------------------------- */
  .search-row { display: flex; gap: 6px; }
  .search-input {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid #2a2a3a;
    background: #181826;
    color: #e0e0e0;
    border-radius: 8px;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: #6366f1; }
  .search-input::placeholder { color: #555; }

  .search-button {
    padding: 8px 14px;
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .search-button:hover { opacity: 0.85; }
  .search-button:disabled { background: #333; color: #666; cursor: not-allowed; }

  .conversation-row {
    margin-top: 8px;
    font-size: 0.7rem;
    color: #555;
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 16px;
  }
  .conversation-row .indicator { color: #a5b4fc; }
  .new-search-btn {
    background: transparent;
    border: none;
    color: #888;
    cursor: pointer;
    font-size: 0.7rem;
    text-decoration: underline;
    padding: 0;
  }
  .new-search-btn:hover { color: #c7d2fe; }

  /* Status messages — loading / error / no-match banner */
  .status {
    margin-top: 12px;
    padding: 10px;
    border-radius: 8px;
    font-size: 0.8rem;
    text-align: center;
  }
  .status.loading { background: #181826; color: #a5b4fc; }
  .status.error { background: #3a1f24; color: #fda4af; }
  .status.no-match { background: #1f1f2e; color: #d4d4d8; }

  /* Conversational answer (brief mode) */
  .answer {
    margin-top: 12px;
    padding: 10px 12px;
    background: #161624;
    border-left: 3px solid #6366f1;
    border-radius: 6px;
    font-size: 0.85rem;
    line-height: 1.4;
    color: #e0e0e0;
  }

  /* Result cards */
  .results { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }

  .card {
    background: #181826;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    padding: 10px 12px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: #3a3a5a; }

  .card-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: #e0e0e0;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .card-meta {
    font-size: 0.7rem;
    color: #777;
    margin-bottom: 6px;
  }
  .card-meta .conf {
    color: #4ade80;
    font-weight: 600;
    margin-left: 4px;
  }
  .card-meta .conf.low { color: #fbbf24; }
  .card-why {
    font-size: 0.75rem;
    color: #a5b4fc;
    font-style: italic;
    margin-bottom: 6px;
  }
  .card-snippet {
    font-size: 0.78rem;
    color: #b0b0b8;
    line-height: 1.4;
    border-left: 2px solid #2a2a3a;
    padding-left: 8px;
    margin-bottom: 8px;
    max-height: 4.5em;
    overflow: hidden;
  }
  .card-link {
    display: inline-block;
    font-size: 0.7rem;
    color: #818cf8;
    text-decoration: none;
  }
  .card-link:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="container">
    <h1>BrainTwin</h1>

    <!-- Tab switcher -->
    <div class="tabs">
      <button class="tab active" data-tab="capture" id="tabCapture">Capture</button>
      <button class="tab" data-tab="remember" id="tabRemember">Remember</button>
    </div>

    <!-- Capture view (unchanged from v0.1) -->
    <div class="view active" id="viewCapture">
      <div class="stat">
        <span class="label">Captured today</span>
        <span class="value" id="count">0</span>
      </div>
      <div class="stat">
        <span class="label">Status</span>
        <span class="value" id="status">Active</span>
      </div>
      <button class="toggle on" id="toggleBtn">Pause Capture</button>
      <div class="footer">Dwell threshold: 30 seconds</div>
    </div>

    <!-- Remember view (Phase 4 M.5) -->
    <div class="view" id="viewRemember">
      <form id="recallForm" class="search-row">
        <input
          id="recallInput"
          class="search-input"
          type="text"
          placeholder="What do you want to remember?"
          autocomplete="off"
        />
        <button id="recallSubmit" class="search-button" type="submit">Find</button>
      </form>

      <div class="conversation-row" id="conversationRow">
        <span class="indicator" id="conversationIndicator"></span>
        <button class="new-search-btn" id="newSearchBtn" type="button" style="display:none">
          start over
        </button>
      </div>

      <div id="recallStatus"></div>
      <div id="recallAnswer"></div>
      <div class="results" id="recallResults"></div>
    </div>
  </div>

  <script src="recall.js"></script>
  <script src="popup.js"></script>
</body>
</html>
